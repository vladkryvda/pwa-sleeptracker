<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Sleep Tracker</title>
  <link rel="manifest" href="manifest.json">
  <style>
    :root {
      --bg-color: #000000;
      --text-main: #ffffff;
      --text-muted: #8e8e93;
      --accent-color: #ffffff;
      --card-bg: #1c1c1e;
      --border-color: #2c2c2e;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
    }

    body {
      background-color: var(--bg-color);
      color: var(--text-main);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      overflow: hidden;
      height: 100vh;
      height: 100dvh;
    }

    /* Контейнер для екранів (SPA) */
    .app-container {
      position: relative;
      width: 100%;
      height: 100%;
      overflow: hidden;
    }

    .screen {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      padding: 24px 20px;
      padding-top: calc(24px + env(safe-area-inset-top));
      padding-bottom: calc(24px + env(safe-area-inset-bottom));
      transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      background-color: var(--bg-color);
    }

    /* Анімація переходу */
    #screen-home {
      transform: translateX(0);
      z-index: 1;
    }
    #screen-home.left {
      transform: translateX(-100%);
    }

    #screen-stats {
      transform: translateX(100%);
      z-index: 2;
    }
    #screen-stats.active {
      transform: translateX(0);
    }

    /* Приховування стандартних скролбарів */
    .no-scrollbar::-webkit-scrollbar {
      display: none;
    }
    .no-scrollbar {
      -ms-overflow-style: none;
      scrollbar-width: none;
    }

    /* --- Головний екран --- */
    .header {
      font-size: 28px;
      font-weight: 700;
      margin-bottom: 20px;
      letter-spacing: -0.5px;
    }

    .history-preview {
      background: var(--card-bg);
      border-radius: 16px;
      padding: 16px;
      cursor: pointer;
      margin-bottom: auto;
    }

    .history-preview-title {
      font-size: 13px;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 12px;
      display: flex;
      justify-content: space-between;
    }

    .history-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 8px 0;
      border-bottom: 1px solid var(--border-color);
    }
    .history-row:last-child {
      border-bottom: none;
    }

    .history-time {
      font-size: 16px;
      font-weight: 500;
    }
    .history-date {
      font-size: 14px;
      color: var(--text-muted);
    }

    /* Центр з кнопкою та таймером */
    .timer-section {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      margin: auto 0;
    }

    .live-timer {
      font-size: 48px;
      font-weight: 300;
      font-variant-numeric: tabular-nums;
      margin-bottom: 30px;
      min-height: 58px;
      opacity: 0;
      transition: opacity 0.3s ease;
    }
    .live-timer.visible {
      opacity: 1;
    }

    .action-button {
      width: 180px;
      height: 180px;
      border-radius: 50%;
      border: 2px solid var(--accent-color);
      background-color: transparent;
      color: var(--text-main);
      font-size: 20px;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background-color 0.2s, transform 0.1s;
      outline: none;
    }
    .action-button:active {
      transform: scale(0.96);
    }
    .action-button.sleeping {
      background-color: var(--accent-color);
      color: var(--bg-color);
    }

    .sync-status {
      font-size: 12px;
      color: var(--text-muted);
      text-align: center;
      margin-top: auto;
    }

    /* --- Екран статистики --- */
    .stats-header {
      display: flex;
      align-items: center;
      margin-bottom: 24px;
    }
    .back-btn {
      background: none;
      border: none;
      color: var(--text-main);
      font-size: 24px;
      cursor: pointer;
      margin-right: 16px;
      outline: none;
    }

    .stats-summary {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 24px;
    }
    .summary-card {
      background: var(--card-bg);
      padding: 14px;
      border-radius: 12px;
    }
    .summary-label {
      font-size: 12px;
      color: var(--text-muted);
      margin-bottom: 4px;
    }
    .summary-val {
      font-size: 18px;
      font-weight: 600;
    }

    /* Графік Screen Time */
    .chart-container {
      background: var(--card-bg);
      border-radius: 16px;
      padding: 16px;
      display: flex;
      flex-direction: column;
      margin-bottom: 20px;
    }
    .chart-title {
      font-size: 14px;
      color: var(--text-muted);
      margin-bottom: 16px;
    }
    .chart-bars {
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      height: 160px;
      padding-bottom: 8px;
    }
    .bar-wrapper {
      display: flex;
      flex-direction: column;
      align-items: center;
      flex: 1;
    }
    .bar {
      width: 14px;
      background: #2c2c2e;
      border-radius: 7px;
      height: 0%; /* Керується через JS */
      transition: height 0.6s cubic-bezier(0.1, 0.8, 0.3, 1);
      position: relative;
    }
    .bar.highlight {
      background: var(--accent-color);
    }
    .bar-day {
      font-size: 11px;
      color: var(--text-muted);
      margin-top: 8px;
    }

    .full-history-list {
      flex: 1;
      overflow-y: scroll;
      padding-right: 2px;
    }
    .history-section-title {
      font-size: 14px;
      color: var(--text-muted);
      margin-bottom: 12px;
      margin-top: 8px;
    }
  </style>
</head>
<body>

  <div class="app-container">
    
    <!-- Головний екран -->
    <section id="screen-home" class="screen">
      <div class="header">Сон</div>
      
      <div class="history-preview" onclick="navigateToStats()">
        <div class="history-preview-title">
          <span>Останні записи</span>
          <span>Детальніше →</span>
        </div>
        <div id="preview-list">
          <!-- Записи рендеряться через JS -->
        </div>
      </div>

      <div class="timer-section">
        <div id="timer-display" class="live-timer">00:00:00</div>
        <button id="main-btn" class="action-button" onclick="toggleSleep()">ПОЧАТИ</button>
      </div>

      <div id="sync-indicator" class="sync-status">Завантаження...</div>
    </section>

    <!-- Екран статистики -->
    <section id="screen-stats" class="screen">
      <div class="stats-header">
        <button class="back-btn" onclick="navigateToHome()">←</button>
        <div class="header" style="margin-bottom: 0;">Аналітика</div>
      </div>

      <div class="stats-summary">
        <div class="summary-card">
          <div class="summary-label">Сер. тривалість</div>
          <div id="stat-avg-duration" class="summary-val">—</div>
        </div>
        <div class="summary-card">
          <div class="summary-label">Сер. час сну</div>
          <div id="stat-avg-bedtime" class="summary-val">—</div>
        </div>
      </div>

      <div class="chart-container">
        <div class="chart-title">Тривалість за останні 7 днів</div>
        <div class="chart-bars" id="chart-bars-container">
          <!-- 7 стовпчиків генеруються динамічно -->
        </div>
      </div>

      <div class="history-section-title">Історія за весь час</div>
      <div id="full-history" class="full-history-list no-scrollbar">
        <!-- Повний список записів -->
      </div>
    </section>

  </div>

  <script>
    // КОНФІГУРАЦІЯ: Сюди вставте URL вашого розгорнутого Google Apps Script
    const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyLdkhNo70k0LU7_wuhlcieF3iHhfmtK-JKmbn4DPKJXo3zgdtXYb5yqdBmZxxqd0u6hQ/exec";

    let sleepData = JSON.parse(localStorage.getItem('sleep_records')) || [];
    let activeSleepStart = localStorage.getItem('active_sleep_start');
    let timerInterval = null;

    // Ініціалізація додатку
    window.addEventListener('load', () => {
      updateSyncStatus();
      renderHomeHistory();
      checkActiveSleepState();
      syncData(); // спроба фонової синхронізації при старті

      // Реєстрація Service Worker для офлайну
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('sw.js')
          .catch(err => console.log('Service Worker не зареєстровано: ', err));
      }
    });

    // Слідкуємо за відновленням мережі
    window.addEventListener('online', () => {
      updateSyncStatus();
      syncData();
    });
    window.addEventListener('offline', updateSyncStatus);

    function updateSyncStatus() {
      const indicator = document.getElementById('sync-indicator');
      if (!navigator.onLine) {
        indicator.textContent = "Офлайн-режим. Дані зберігаються локально.";
        return;
      }
      const unsyncedCount = sleepData.filter(r => !r.synced).length;
      if (unsyncedCount > 0) {
        indicator.textContent = `Несинхронізовано записів: ${unsyncedCount}. Синхронізація...`;
      } else {
        indicator.textContent = "Усі дані успішно синхронізовано з хмарою.";
      }
    }

    function checkActiveSleepState() {
      const btn = document.getElementById('main-btn');
      const timerDisplay = document.getElementById('timer-display');
      
      if (activeSleepStart) {
        btn.textContent = "ПРОКИНУТИСЬ";
        btn.classList.add('sleeping');
        timerDisplay.classList.add('visible');
        startTimer();
      } else {
        btn.textContent = "ПОЧАТИ СН";
        btn.classList.remove('sleeping');
        timerDisplay.classList.remove('visible');
        stopTimer();
      }
    }

    function startTimer() {
      if (timerInterval) clearInterval(timerInterval);
      
      const update = () => {
        const start = new Date(activeSleepStart);
        const diff = new Date() - start;
        const hrs = Math.floor(diff / 3600000);
        const mins = Math.floor((diff % 3600000) / 60000);
        const secs = Math.floor((diff % 60000) / 1000);
        
        document.getElementById('timer-display').textContent = 
          `${String(hrs).padStart(2, '0')}:${String(mins).padStart(2, '0')}:${String(secs).padStart(2, '0')}`;
      };
      
      update();
      timerInterval = setInterval(update, 1000);
    }

    function stopTimer() {
      if (timerInterval) {
        clearInterval(timerInterval);
        timerInterval = null;
      }
    }

    function toggleSleep() {
      if (!activeSleepStart) {
        // Почати сон
        activeSleepStart = new Date().toISOString();
        localStorage.setItem('active_sleep_start', activeSleepStart);
        checkActiveSleepState();
      } else {
        // Прокинутись
        const endTime = new Date().toISOString();
        const startTime = activeSleepStart;
        
        const durationHrs = (new Date(endTime) - new Date(startTime)) / 3600000;
        
        // Ігноруємо сесії коротші за 1 хвилину (запобігання випадковим клікам)
        if (durationHrs * 60 >= 1) {
          const newRecord = {
            id: Date.now().toString(),
            startTime: startTime,
            endTime: endTime,
            duration: parseFloat(durationHrs.toFixed(2)),
            synced: false
          };
          
          sleepData.unshift(newRecord);
          localStorage.setItem('sleep_records', JSON.stringify(sleepData));
        }

        activeSleepStart = null;
        localStorage.removeItem('active_sleep_start');
        
        checkActiveSleepState();
        renderHomeHistory();
        syncData();
      }
    }

    // Рендер короткої історії на першому екрані
    function renderHomeHistory() {
      const list = document.getElementById('preview-list');
      list.innerHTML = '';
      
      const lastThree = sleepData.slice(0, 3);
      if (lastThree.length === 0) {
        list.innerHTML = '<div class="history-row" style="color:var(--text-muted)">Немає записів</div>';
        return;
      }

      lastThree.forEach(item => {
        const dateObj = new Date(item.endTime);
        const dateStr = dateObj.toLocaleDateString('uk-UA', { day: '2-digit', month: '2-digit' });
        const timeStr = `${Math.floor(item.duration)}г ${Math.round((item.duration % 1) * 60)}хв`;
        
        list.innerHTML += `
          <div class="history-row">
            <span class="history-time">${timeStr}</span>
            <span class="history-date">ранком ${dateStr}</span>
          </div>
        `;
      });
    }

    // Переходи між екранами
    function navigateToStats() {
      document.getElementById('screen-home').classList.add('left');
      document.getElementById('screen-stats').classList.add('active');
      renderStatistics();
    }

    function navigateToHome() {
      document.getElementById('screen-home').classList.remove('left');
      document.getElementById('screen-stats').classList.remove('active');
      renderHomeHistory();
    }

    // Розрахунок та візуалізація статистики
    function renderStatistics() {
      // 1. Загальні показники
      if (sleepData.length === 0) {
        document.getElementById('stat-avg-duration').textContent = '—';
        document.getElementById('stat-avg-bedtime').textContent = '—';
        return;
      }

      const totalDuration = sleepData.reduce((acc, curr) => acc + curr.duration, 0);
      const avgDuration = totalDuration / sleepData.length;
      document.getElementById('stat-avg-duration').textContent = 
        `${Math.floor(avgDuration)}г ${Math.round((avgDuration % 1) * 60)}хв`;

      // Розрахунок середнього часу відходу до сну
      let totalMinutesFromNoon = 0;
      sleepData.forEach(item => {
        const start = new Date(item.startTime);
        let hrs = start.getHours();
        let mins = start.getMinutes();
        // Рахуємо хвилини від 12:00 дня, щоб уникнути похибки переходу через опівніч
        let minutesFromNoon = (hrs >= 12) ? ((hrs - 12) * 60 + mins) : ((hrs + 12) * 60 + mins);
        totalMinutesFromNoon += minutesFromNoon;
      });
      const avgMinutesFromNoon = totalMinutesFromNoon / sleepData.length;
      let avgHrs = Math.floor(avgMinutesFromNoon / 60) + 12;
      if (avgHrs >= 24) avgHrs -= 24;
      const avgMins = Math.round(avgMinutesFromNoon % 60);
      document.getElementById('stat-avg-bedtime').textContent = 
        `${String(avgHrs).padStart(2, '0')}:${String(avgMins).padStart(2, '0')}`;

      // 2. Рендеринг графіка (Останні 7 днів)
      renderWeeklyChart();

      // 3. Повна історія
      const fullHistoryContainer = document.getElementById('full-history');
      fullHistoryContainer.innerHTML = '';
      sleepData.forEach(item => {
        const start = new Date(item.startTime);
        const end = new Date(item.endTime);
        const dateStr = end.toLocaleDateString('uk-UA', { weekday: 'short', day: 'numeric', month: 'short' });
        const formatTime = (d) => `${String(d.getHours()).padStart(2, '0')}:${String(d.getMinutes()).padStart(2, '0')}`;
        
        fullHistoryContainer.innerHTML += `
          <div class="history-row" style="padding: 12px 0;">
            <div>
              <div class="history-time">${Math.floor(item.duration)}г ${Math.round((item.duration % 1) * 60)}хв</div>
              <div style="font-size: 12px; color: var(--text-muted); margin-top: 4px;">
                ${formatTime(start)} – ${formatTime(end)}
              </div>
            </div>
            <span class="history-date">${dateStr}</span>
          </div>
        `;
      });
    }

    function renderWeeklyChart() {
      const container = document.getElementById('chart-bars-container');
      container.innerHTML = '';

      const daysOfWeek = ['Нд', 'Пн', 'Вв', 'Ср', 'Чт', 'Пт', 'Сб'];
      const today = new Date();
      
      // Створюємо масив останніх 7 днів
      const last7Days = [];
      for (let i = 6; i >= 0; i--) {
        const d = new Date();
        d.setDate(today.getDate() - i);
        last7Days.push({
          dateString: d.toDateString(),
          dayLabel: daysOfWeek[d.getDay()],
          duration: 0,
          isToday: d.toDateString() === today.toDateString()
        });
      }

      // Наповнюємо даними сну (по даті закінчення)
      sleepData.forEach(item => {
        const endDayStr = new Date(item.endTime).toDateString();
        const foundDay = last7Days.find(d => d.dateString === endDayStr);
        if (foundDay) {
          foundDay.duration += item.duration; // сумуємо, якщо лягали кілька разів за добу
        }
      });

      // Максимальна висота для масштабування графіка (нехай 12 годин — це 100%)
      const maxTargetHours = 12;

      last7Days.forEach(day => {
        const percentage = Math.min((day.duration / maxTargetHours) * 100, 100);
        const barClass = day.isToday ? 'bar highlight' : 'bar';
        
        container.innerHTML += `
          <div class="bar-wrapper">
            <div class="${barClass}" style="height: ${percentage}%" title="${day.duration.toFixed(1)} год."></div>
            <div class="bar-day">${day.dayLabel}</div>
          </div>
        `;
      });
    }

    // Фонова синхронізація через POST запит до Google Apps Script
    async function syncData() {
      if (!navigator.onLine || APPS_SCRIPT_URL.includes("ВАШ_ID_СКРИПТА")) {
        updateSyncStatus();
        return;
      }

      const unsyncedRecords = sleepData.filter(r => !r.synced);
      if (unsyncedRecords.length === 0) {
        updateSyncStatus();
        return;
      }

      try {
        const response = await fetch(APPS_SCRIPT_URL, {
          method: 'POST',
          mode: 'cors',
          headers: {
            'Content-Type': 'application/json',
          },
          body: JSON.stringify(unsyncedRecords)
        });

        const result = await response.json();
        if (result.status === "success") {
          // Відмічаємо синхронізовані записи
          sleepData = sleepData.map(r => {
            if (unsyncedRecords.some(un => un.id === r.id)) {
              r.synced = true;
            }
            return r;
          });
          localStorage.setItem('sleep_records', JSON.stringify(sleepData));
          updateSyncStatus();
        }
      } catch (error) {
        console.error("Помилка синхронізації:", error);
        updateSyncStatus();
      }
    }
  </script>
</body>
</html>
