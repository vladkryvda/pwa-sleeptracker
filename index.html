<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Sleep Tracker</title>
  <link rel="manifest" href="manifest.json">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght=200;300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-color: #ffffff;
      --text-main: #000000;
      --text-muted: #8e8e93;
      --card-bg: #1c1c1e;
      --glass-bg: rgba(255, 255, 255, 0.03);
      --glass-border: rgba(255, 255, 255, 0.08);
      --glass-shine: rgba(255, 255, 255, 0.12);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
    }

    html, body {
      background-color: #ffffff;
      color: #000000;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif;
      overflow: hidden;
      height: 100%;
      width: 100%;
      transition: background-color 0.6s cubic-bezier(0.16, 1, 0.3, 1), 
                  color 0.6s cubic-bezier(0.16, 1, 0.3, 1);
    }

    body.sleeping {
      background-color: #000000;
      color: #ffffff;
    }

    .app-container {
      position: relative;
      width: 100%;
      height: 100%;
      overflow: hidden;
    }

    .screen {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      padding: 24px 20px;
      padding-top: calc(30px + env(safe-area-inset-top));
      padding-bottom: calc(30px + env(safe-area-inset-bottom));
      transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1);
    }

    /* --- HOME SCREEN --- */
    #screen-home {
      transform: translateX(0);
      z-index: 1;
      background-color: transparent;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      cursor: pointer;
    }
    
    #screen-home.left {
      transform: translateX(-100%);
    }

    .nav-arrow-btn {
      position: absolute;
      top: calc(24px + env(safe-area-inset-top));
      right: 24px;
      background: none;
      border: none;
      color: currentColor;
      cursor: pointer;
      padding: 8px;
      z-index: 10;
      outline: none;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: opacity 0.2s;
    }
    .nav-arrow-btn:active {
      opacity: 0.5;
    }

    .center-status {
      font-size: 15px;
      font-weight: 500;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      pointer-events: none;
      transition: opacity 0.4s ease;
    }

    #screen-home.sleeping .center-status {
      opacity: 0;
      pointer-events: none;
    }

    .ecg-container {
      position: absolute;
      left: 0;
      right: 0;
      width: 100%;
      height: 120px;
      top: 50%;
      transform: translateY(-50%);
      display: none;
      pointer-events: none;
    }
    .ecg-container canvas {
      width: 100%;
      height: 100%;
    }

    .sleep-timer-minimal {
      position: absolute;
      bottom: calc(30px + env(safe-area-inset-bottom));
      left: 50%;
      transform: translateX(-50%);
      font-size: 11px;
      font-weight: 400;
      letter-spacing: 0.15em;
      color: rgba(255, 255, 255, 0.3);
      font-variant-numeric: tabular-nums;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.4s ease;
    }

    #screen-home.sleeping .sleep-timer-minimal {
      opacity: 1;
    }

    /* --- STATS SCREEN --- */
    #screen-stats {
      transform: translateX(100%);
      z-index: 2;
      background-color: #000000;
      color: #ffffff;
    }
    #screen-stats.active {
      transform: translateX(0);
    }

    .back-arrow-btn {
      background: none;
      border: none;
      color: #ffffff;
      cursor: pointer;
      padding: 8px;
      outline: none;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: opacity 0.2s;
      align-self: flex-start;
      margin-bottom: 20px;
    }
    .back-arrow-btn:active {
      opacity: 0.5;
    }

    /* Liquid Glass Panels */
    .glass-panel {
      background: var(--glass-bg);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid var(--glass-border);
      border-radius: 24px;
      padding: 20px;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5), 
                  inset 0 1px 0 var(--glass-shine);
    }

    .stats-summary {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 20px;
    }
    
    .summary-card {
      padding: 16px;
    }
    .summary-label {
      font-size: 10px;
      font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 6px;
    }
    .summary-val {
      font-size: 18px;
      font-weight: 600;
      letter-spacing: -0.02em;
    }

    /* Weekly Chart */
    .chart-container {
      display: flex;
      flex-direction: column;
      margin-bottom: 20px;
    }
    .chart-title {
      font-size: 10px;
      font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 20px;
    }
    .chart-bars {
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      height: 140px;
      padding-bottom: 4px;
    }
    .bar-wrapper {
      display: flex;
      flex-direction: column;
      align-items: center;
      flex: 1;
    }
    .bar {
      width: 14px;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 7px;
      height: 0%;
      transition: height 0.6s cubic-bezier(0.16, 1, 0.3, 1);
      position: relative;
    }
    .bar.highlight {
      background: #ffffff;
      box-shadow: 0 0 12px rgba(255, 255, 255, 0.3);
    }
    .bar-day {
      font-size: 10px;
      color: var(--text-muted);
      margin-top: 8px;
      font-weight: 500;
    }

    /* Swipe-to-Delete History */
    .history-section-title {
      font-size: 10px;
      font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 12px;
    }

    .full-history-list {
      flex: 1;
      overflow-y: scroll;
      padding-right: 2px;
    }

    .full-history-list::-webkit-scrollbar {
      display: none;
    }

    .swipe-container {
      position: relative;
      overflow: hidden; /* Маскує червону кнопку поза контейнером */
      margin-bottom: 12px;
      border-radius: 18px;
      height: 64px;
      background-color: transparent;
    }

    .history-row {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: var(--glass-bg);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid var(--glass-border);
      border-radius: 18px;
      padding: 12px 16px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      z-index: 2;
      box-shadow: inset 0 1px 0 var(--glass-shine);
      transform: translateX(0px);
    }

    .delete-underlay {
      position: absolute;
      top: 0;
      right: 0;
      width: 74px;
      height: 100%;
      background-color: #ff3b30;
      border-radius: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #ffffff;
      z-index: 1;
      cursor: pointer;
      /* За замовчуванням зміщена праворуч, щоб її не було видно за прозорою карткою */
      transform: translateX(74px);
    }

    .delete-icon {
      width: 22px;
      height: 22px;
      fill: #ffffff;
    }

    .history-time {
      font-size: 16px;
      font-weight: 500;
      letter-spacing: -0.01em;
    }
    .history-date {
      font-size: 13px;
      color: var(--text-muted);
    }
  </style>
</head>
<body>

  <div class="app-container">
    
    <!-- HOME SCREEN -->
    <section id="screen-home" class="screen" onclick="handleScreenTap(event)">
      <button id="nav-to-stats-btn" class="nav-arrow-btn" onclick="navigateToStats(event)">
        <svg viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="1.2" fill="none" stroke-linecap="round" stroke-linejoin="round">
          <line x1="5" y1="12" x2="19" y2="12"></line>
          <polyline points="12 5 19 12 12 19"></polyline>
        </svg>
      </button>
      
      <div id="status-label" class="center-status">Tap to sleep</div>
      
      <div id="ecg-container" class="ecg-container">
        <canvas id="ecg-canvas"></canvas>
      </div>

      <div id="sleep-timer-minimal" class="sleep-timer-minimal">00:00:00</div>
    </section>

    <!-- STATS SCREEN -->
    <section id="screen-stats" class="screen">
      <button class="back-arrow-btn" onclick="navigateToHome()">
        <svg viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="1.2" fill="none" stroke-linecap="round" stroke-linejoin="round">
          <line x1="19" y1="12" x2="5" y2="12"></line>
          <polyline points="12 19 5 12 12 5"></polyline>
        </svg>
      </button>

      <div class="stats-summary">
        <div class="glass-panel summary-card">
          <div class="summary-label">Avg. Sleep</div>
          <div id="stat-avg-duration" class="summary-val">—</div>
        </div>
        <div class="glass-panel summary-card">
          <div class="summary-label">Avg. Bedtime</div>
          <div id="stat-avg-bedtime" class="summary-val">—</div>
        </div>
      </div>

      <div class="glass-panel chart-container">
        <div class="chart-title">Last 7 Days</div>
        <div class="chart-bars" id="chart-bars-container"></div>
      </div>

      <div class="history-section-title">All History</div>
      <div id="full-history" class="full-history-list"></div>
    </section>

  </div>

  <script>
    // Посилання на ваш розгорнутий Google Apps Script веб-додаток
    const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwoUfsbCHVST8M1O5VLkRbhVIS4RqyPNi268Q3obQ5XG0UMu1j6hnXf-yepJv4NoFSWag/exec";

    let sleepData = JSON.parse(localStorage.getItem('sleep_records')) || [];
    let deletedQueue = JSON.parse(localStorage.getItem('sleep_deleted_queue')) || [];
    let activeSleepStart = localStorage.getItem('active_sleep_start');
    
    let ecgCanvas = document.getElementById('ecg-canvas');
    let ecgCtx = ecgCanvas.getContext('2d');
    let ecgAnimationId = null;
    let waveTimer = 0;
    let timerInterval = null;

    let touchStartX = 0;
    let activeSwipeRow = null;

    window.addEventListener('load', async () => {
      checkActiveSleepState();
      // Спочатку завантажуємо актуальні резервні дані з таблиці (як iCloud),
      // а потім виконуємо синхронізацію локальних змін
      await loadDataFromBackup();
      syncData();
      window.addEventListener('resize', resizeCanvas);
    });

    window.addEventListener('online', syncData);

    function resizeCanvas() {
      if (activeSleepStart) {
        ecgCanvas.width = ecgCanvas.parentElement.clientWidth * window.devicePixelRatio;
        ecgCanvas.height = ecgCanvas.parentElement.clientHeight * window.devicePixelRatio;
        ecgCtx.scale(window.devicePixelRatio, window.devicePixelRatio);
      }
    }

    function checkActiveSleepState() {
      const homeScreen = document.getElementById('screen-home');
      const ecgContainer = document.getElementById('ecg-container');
      
      if (activeSleepStart) {
        document.body.classList.add('sleeping');
        homeScreen.classList.add('sleeping');
        ecgContainer.style.display = "block";
        resizeCanvas();
        startWaveAnimation();
        startTimer();
      } else {
        if (!document.getElementById('screen-stats').classList.contains('active')) {
          document.body.classList.remove('sleeping');
        }
        homeScreen.classList.remove('sleeping');
        ecgContainer.style.display = "none";
        stopWaveAnimation();
        stopTimer();
      }
    }

    function startWaveAnimation() {
      if (ecgAnimationId) cancelAnimationFrame(ecgAnimationId);
      waveTimer = Date.now();

      const width = ecgCanvas.width / window.devicePixelRatio;
      const height = ecgCanvas.height / window.devicePixelRatio;
      const baseline = height / 2;

      function draw() {
        if (!activeSleepStart) return;

        ecgCtx.clearRect(0, 0, width, height);

        const now = Date.now();
        const elapsed = (now - waveTimer) / 1000;
        
        const cycleDuration = 5.0; 
        const totalCycle = cycleDuration * 2; 
        const progress = (elapsed % totalCycle) / cycleDuration; 

        let startX = 0;
        let endX = 0;

        if (progress <= 1) {
          startX = 0;
          endX = width * progress;
        } else {
          const eraseProgress = progress - 1; 
          startX = width * eraseProgress;
          endX = width;
        }

        ecgCtx.strokeStyle = 'rgba(255, 255, 255, 0.4)';
        ecgCtx.lineWidth = 1.2; 
        ecgCtx.shadowBlur = 4;
        ecgCtx.shadowColor = 'rgba(255, 255, 255, 0.2)';
        ecgCtx.lineJoin = 'round';
        ecgCtx.beginPath();

        let isDrawingStarted = false;

        for (let x = Math.round(startX); x <= Math.round(endX); x++) {
          const amplitude = 22 * Math.sin((x / width) * Math.PI);
          const frequency = 0.04;
          const phase = elapsed * 1.5; 
          const y = baseline + Math.sin(x * frequency - phase) * amplitude;

          if (!isDrawingStarted) {
            ecgCtx.moveTo(x, y);
            isDrawingStarted = true;
          } else {
            ecgCtx.lineTo(x, y);
          }
        }
        ecgCtx.stroke();

        ecgAnimationId = requestAnimationFrame(draw);
      }

      draw();
    }

    function stopWaveAnimation() {
      if (ecgAnimationId) {
        cancelAnimationFrame(ecgAnimationId);
        ecgAnimationId = null;
      }
    }

    function startTimer() {
      if (timerInterval) clearInterval(timerInterval);
      
      const timerDisplay = document.getElementById('sleep-timer-minimal');
      const update = () => {
        const start = new Date(activeSleepStart);
        const diff = new Date() - start;
        const hrs = Math.floor(diff / 3600000);
        const mins = Math.floor((diff % 3600000) / 60000);
        const secs = Math.floor((diff % 60000) / 1000);
        
        timerDisplay.textContent = 
          `${String(hrs).padStart(2, '0')}:${String(mins).padStart(2, '0')}:${String(secs).padStart(2, '0')}`;
      };
      
      update();
      timerInterval = setInterval(update, 1000);
    }

    function stopTimer() {
      if (timerInterval) {
        clearInterval(timerInterval);
        timerInterval = null;
      }
    }

    function handleScreenTap(event) {
      if (event.target.closest('#nav-to-stats-btn')) return;
      toggleSleep();
    }

    function toggleSleep() {
      if (!activeSleepStart) {
        activeSleepStart = new Date().toISOString();
        localStorage.setItem('active_sleep_start', activeSleepStart);
        checkActiveSleepState();
      } else {
        const endTime = new Date().toISOString();
        const startTime = activeSleepStart;
        const durationHrs = (new Date(endTime) - new Date(startTime)) / 3600000;
        
        if (durationHrs > 0) {
          const newRecord = {
            id: Date.now().toString(),
            startTime: startTime,
            endTime: endTime,
            duration: parseFloat(durationHrs.toFixed(4)),
            synced: false
          };
          
          sleepData.unshift(newRecord);
          localStorage.setItem('sleep_records', JSON.stringify(sleepData));
        }

        activeSleepStart = null;
        localStorage.removeItem('active_sleep_start');
        
        checkActiveSleepState();
        syncData();
      }
    }

    function navigateToStats(event) {
      event.stopPropagation();
      document.body.classList.add('sleeping');
      document.getElementById('screen-home').classList.add('left');
      document.getElementById('screen-stats').classList.add('active');
      renderStatistics();
    }

    function navigateToHome() {
      if (!activeSleepStart) {
        document.body.classList.remove('sleeping');
      }
      document.getElementById('screen-home').classList.remove('left');
      document.getElementById('screen-stats').classList.remove('active');
    }

    // --- SWIPE-TO-DELETE GESTURES (Синхронне насування червоного блоку) ---
    function initSwipeGestures() {
      const rows = document.querySelectorAll('.history-row');
      rows.forEach(row => {
        const underlay = row.parentElement.querySelector('.delete-underlay');

        row.addEventListener('touchstart', (e) => {
          touchStartX = e.touches[0].clientX;
          
          if (activeSwipeRow && activeSwipeRow !== row) {
            const activeUnderlay = activeSwipeRow.parentElement.querySelector('.delete-underlay');
            activeSwipeRow.style.transition = 'transform 0.25s cubic-bezier(0.16, 1, 0.3, 1)';
            activeSwipeRow.style.transform = 'translateX(0px)';
            if (activeUnderlay) {
              activeUnderlay.style.transition = 'transform 0.25s cubic-bezier(0.16, 1, 0.3, 1)';
              activeUnderlay.style.transform = 'translateX(74px)';
            }
          }
        }, { passive: true });

        row.addEventListener('touchmove', (e) => {
          const currentX = e.touches[0].clientX;
          const diffX = currentX - touchStartX;
          
          if (diffX < 0) {
            row.style.transition = 'none'; 
            if (underlay) underlay.style.transition = 'none';

            const translate = Math.max(diffX, -85);
            row.style.transform = `translateX(${translate}px)`;
            
            // Червона кнопка рухається паралельно зсуву картки
            if (underlay) {
              const underlayTranslate = Math.max(74 + translate, 0);
              underlay.style.transform = `translateX(${underlayTranslate}px)`;
            }
          } else {
            row.style.transform = 'translateX(0px)';
            if (underlay) underlay.style.transform = 'translateX(74px)';
          }
        }, { passive: true });

        row.addEventListener('touchend', (e) => {
          const currentX = e.changedTouches[0].clientX;
          const diffX = currentX - touchStartX;
          
          row.style.transition = 'transform 0.25s cubic-bezier(0.16, 1, 0.3, 1)';
          if (underlay) underlay.style.transition = 'transform 0.25s cubic-bezier(0.16, 1, 0.3, 1)';
          
          if (diffX < -40) {
            row.style.transform = 'translateX(-74px)';
            if (underlay) underlay.style.transform = 'translateX(0px)';
            activeSwipeRow = row;
          } else {
            row.style.transform = 'translateX(0px)';
            if (underlay) underlay.style.transform = 'translateX(74px)';
            activeSwipeRow = null;
          }
        });
      });
    }

    function deleteRecord(id) {
      sleepData = sleepData.filter(record => record.id !== id);
      localStorage.setItem('sleep_records', JSON.stringify(sleepData));
      
      if (!deletedQueue.includes(id)) {
        deletedQueue.push(id);
        localStorage.setItem('sleep_deleted_queue', JSON.stringify(deletedQueue));
      }
      
      renderStatistics();
      syncData();
    }

    function renderStatistics() {
      if (sleepData.length === 0) {
        document.getElementById('stat-avg-duration').textContent = '—';
        document.getElementById('stat-avg-bedtime').textContent = '—';
        renderWeeklyChart();
        document.getElementById('full-history').innerHTML = '<div style="color:var(--text-muted); padding: 10px 0; font-size:14px;">No history yet</div>';
        return;
      }

      const totalDuration = sleepData.reduce((acc, curr) => acc + curr.duration, 0);
      const avgDuration = totalDuration / sleepData.length;
      const avgHrs = Math.floor(avgDuration);
      const avgMins = Math.round((avgDuration % 1) * 60);
      document.getElementById('stat-avg-duration').textContent = 
        avgHrs > 0 ? `${avgHrs}h ${avgMins}m` : `${avgMins}m`;

      let totalMinutesFromNoon = 0;
      sleepData.forEach(item => {
        const start = new Date(item.startTime);
        let hrs = start.getHours();
        let mins = start.getMinutes();
        let minutesFromNoon = (hrs >= 12) ? ((hrs - 12) * 60 + mins) : ((hrs + 12) * 60 + mins);
        totalMinutesFromNoon += minutesFromNoon;
      });
      const avgMinutesFromNoon = totalMinutesFromNoon / sleepData.length;
      let avgBedHrs = Math.floor(avgMinutesFromNoon / 60) + 12;
      if (avgBedHrs >= 24) avgBedHrs -= 24;
      const avgBedMins = Math.round(avgMinutesFromNoon % 60);
      document.getElementById('stat-avg-bedtime').textContent = 
        `${String(avgBedHrs).padStart(2, '0')}:${String(avgBedMins).padStart(2, '0')}`;

      renderWeeklyChart();

      const fullHistoryContainer = document.getElementById('full-history');
      fullHistoryContainer.innerHTML = '';
      
      sleepData.forEach(item => {
        const start = new Date(item.startTime);
        const end = new Date(item.endTime);
        const dateStr = end.toLocaleDateString('en-US', { weekday: 'short', day: 'numeric', month: 'short' });
        const formatTime = (d) => `${String(d.getHours()).padStart(2, '0')}:${String(d.getMinutes()).padStart(2, '0')}`;
        
        const h = Math.floor(item.duration);
        const m = Math.round((item.duration % 1) * 60);
        const durationStr = h > 0 ? `${h}h ${m}m` : `${m}m`;

        fullHistoryContainer.innerHTML += `
          <div class="swipe-container">
            <div class="delete-underlay" style="transform: translateX(74px);" onclick="deleteRecord('${item.id}')">
              <svg class="delete-icon" viewBox="0 0 24 24">
                <path d="M6 19c0 1.1.9 2 2 2h8c1.1 0 2-.9 2-2V7H6v12zM19 4h-3.5l-1-1h-5l-1 1H5v2h14V4z"/>
              </svg>
            </div>
            <div class="history-row" style="transform: translateX(0px);">
              <div>
                <div class="history-time">${durationStr}</div>
                <div style="font-size: 11px; color: var(--text-muted); margin-top: 4px; font-weight:500;">
                  ${formatTime(start)} – ${formatTime(end)}
                </div>
              </div>
              <span class="history-date">${dateStr}</span>
            </div>
          </div>
        `;
      });

      initSwipeGestures();
    }

    function renderWeeklyChart() {
      const container = document.getElementById('chart-bars-container');
      container.innerHTML = '';

      const daysOfWeek = ['Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat', 'Sun'];
      const today = new Date();
      
      let currentDay = today.getDay(); 
      let mondayOffset = currentDay === 0 ? -6 : 1 - currentDay;
      
      const currentWeekDays = [];
      for (let i = 0; i < 7; i++) {
        const d = new Date();
        d.setDate(today.getDate() + mondayOffset + i);
        currentWeekDays.push({
          dateString: d.toDateString(),
          dayLabel: daysOfWeek[i],
          duration: 0,
          isToday: d.toDateString() === today.toDateString()
        });
      }

      sleepData.forEach(item => {
        const endDayStr = new Date(item.endTime).toDateString();
        const foundDay = currentWeekDays.find(d => d.dateString === endDayStr);
        if (foundDay) {
          foundDay.duration += item.duration;
        }
      });

      const maxTargetHours = 12;

      currentWeekDays.forEach(day => {
        const percentage = Math.min((day.duration / maxTargetHours) * 100, 100);
        const barClass = day.isToday ? 'bar highlight' : 'bar';
        
        container.innerHTML += `
          <div class="bar-wrapper">
            <div class="${barClass}" style="height: ${percentage}%" title="${day.duration.toFixed(1)} hrs"></div>
            <div class="bar-day">${day.dayLabel}</div>
          </div>
        `;
      });
    }

    // --- БЕКАП-ІМПОРТ З GOOGLE ТАБЛИЦІ (iCloud логіка) ---
    async function loadDataFromBackup() {
      if (!navigator.onLine || APPS_SCRIPT_URL.includes("ВАШ_ID_СКРИПТА")) {
        return;
      }

      try {
        const response = await fetch(APPS_SCRIPT_URL);
        if (response.ok) {
          const remoteData = await response.json();
          if (Array.isArray(remoteData)) {
            // Фільтруємо отримані дані хмари, виключаючи ті, які ми щойно локально видалили (але ще не синхронізували)
            const filteredRemote = remoteData.filter(r => !deletedQueue.includes(r.id));
            
            // Отримуємо локальні унікальні записи, які ще не були надіслані до таблиці
            const unsyncedLocals = sleepData.filter(r => !r.synced);
            
            // Перетворюємо дані з хмари на локальний формат зі статусом synced: true
            const mergedData = filteredRemote.map(r => ({ ...r, synced: true }));
            
            // Повертаємо узагальнені несинхронізовані записи на початок списку
            unsyncedLocals.forEach(localItem => {
              if (!mergedData.some(remoteItem => remoteItem.id === localItem.id)) {
                mergedData.unshift(localItem);
              }
            });

            // Сортуємо записи за датою
            mergedData.sort((a, b) => new Date(b.startTime) - new Date(a.startTime));

            sleepData = mergedData;
            localStorage.setItem('sleep_records', JSON.stringify(sleepData));
            renderStatistics();
          }
        }
      } catch (error) {
        console.error("Помилка завантаження бекапу:", error);
      }
    }

    // --- ЕКСПОРТ ЛОКАЛЬНИХ ЗМІН У GOOGLE ТАБЛИЦЮ ---
    async function syncData() {
      if (!navigator.onLine || APPS_SCRIPT_URL.includes("AKfycbwoUfsbCHVST8M1O5VLkRbhVIS4RqyPNi268Q3obQ5XG0UMu1j6hnXf-yepJv4NoFSWag")) {
        return;
      }

      const unsyncedInserts = sleepData.filter(r => !r.synced);
      const unsyncedDeletes = [...deletedQueue];

      if (unsyncedInserts.length === 0 && unsyncedDeletes.length === 0) return;

      const payload = {
        inserts: unsyncedInserts,
        deletes: unsyncedDeletes
      };

      try {
        await fetch(APPS_SCRIPT_URL, {
          method: 'POST',
          mode: 'no-cors', 
          headers: {
            'Content-Type': 'application/json',
          },
          body: JSON.stringify(payload)
        });

        // Позначаємо надіслані логи як синхронізовані
        sleepData = sleepData.map(r => {
          if (unsyncedInserts.some(un => un.id === r.id)) {
            r.synced = true;
          }
          return r;
        });
        localStorage.setItem('sleep_records', JSON.stringify(sleepData));

        // Очищаємо чергу видалення у разі успіху
        deletedQueue = deletedQueue.filter(id => !unsyncedDeletes.includes(id));
        localStorage.setItem('sleep_deleted_queue', JSON.stringify(deletedQueue));

      } catch (error) {
        console.error("Sync error:", error);
      }
    }
  </script>
