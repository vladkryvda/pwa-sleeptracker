<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Sleep Tracker</title>
  
  <link rel="apple-touch-icon" href="apple-touch-icon.png">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght=200;300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-color: #000000;
      --text-main: #ffffff;
      --text-muted: #8e8e93;
      --card-bg: #1c1c1e;
      --glass-bg: rgba(255, 255, 255, 0.03);
      --glass-border: rgba(255, 255, 255, 0.08);
      --glass-shine: rgba(255, 255, 255, 0.12);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
    }

    html, body {
      background-color: #000000;
      color: #ffffff;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif;
      overflow: hidden;
      height: 100%;
      width: 100%;
    }

    body.sleeping {
      background-color: #000000;
      color: #ffffff;
    }

    .app-container {
      position: relative;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background-color: #000000;
    }

    /* Монолітний екран без нижніх відступів-футерів */
    .screen {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      padding: 24px 20px;
      padding-top: calc(30px + env(safe-area-inset-top));
      padding-bottom: env(safe-area-inset-bottom);
      background-color: #000000;
      transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1);
    }

    /* --- HOME SCREEN --- */
    #screen-home {
      transform: translateX(0);
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      cursor: pointer;
    }
    
    #screen-home.left {
      transform: translateX(-100%);
    }

    .nav-arrow-btn {
      position: absolute;
      top: calc(24px + env(safe-area-inset-top));
      right: 24px;
      background: none;
      border: none;
      color: currentColor;
      cursor: pointer;
      padding: 8px;
      z-index: 10;
      outline: none;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: opacity 0.2s;
    }
    .nav-arrow-btn:active { opacity: 0.5; }

    /* Sync indicator */
    .sync-indicator {
      position: absolute;
      top: calc(24px + env(safe-area-inset-top));
      left: 24px;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #8e8e93;
      transition: background 0.4s ease, box-shadow 0.4s ease;
    }
    .sync-indicator.syncing {
      background: #ffd60a;
      box-shadow: 0 0 6px rgba(255, 214, 10, 0.6);
      animation: pulse 1s infinite;
    }
    .sync-indicator.synced {
      background: #30d158;
      box-shadow: 0 0 6px rgba(48, 209, 88, 0.5);
    }
    .sync-indicator.error {
      background: #ff453a;
      box-shadow: 0 0 6px rgba(255, 69, 58, 0.5);
    }
    .sync-indicator.offline {
      background: #8e8e93;
      box-shadow: none;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    .center-status {
      font-size: 15px;
      font-weight: 500;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      pointer-events: none;
      transition: opacity 0.4s ease;
    }

    #screen-home.sleeping .center-status {
      opacity: 0;
      pointer-events: none;
    }

    .ecg-container {
      position: absolute;
      left: 0;
      right: 0;
      width: 100%;
      height: 120px;
      top: 50%;
      transform: translateY(-50%);
      display: none;
      pointer-events: none;
    }
    .ecg-container canvas {
      width: 100%;
      height: 100%;
    }

    .sleep-timer-minimal {
      position: absolute;
      bottom: calc(30px + env(safe-area-inset-bottom));
      left: 50%;
      transform: translateX(-50%);
      font-size: 11px;
      font-weight: 400;
      letter-spacing: 0.15em;
      color: rgba(255, 255, 255, 0.3);
      font-variant-numeric: tabular-nums;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.4s ease;
    }

    #screen-home.sleeping .sleep-timer-minimal { opacity: 1; }

    /* --- STATS SCREEN --- */
    #screen-stats {
      transform: translateX(100%);
      z-index: 2;
    }
    #screen-stats.active { transform: translateX(0); }

    .back-arrow-btn {
      background: none;
      border: none;
      color: #ffffff;
      cursor: pointer;
      padding: 8px;
      outline: none;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: opacity 0.2s;
      align-self: flex-start;
      margin-bottom: 20px;
    }
    .back-arrow-btn:active { opacity: 0.5; }

    .glass-panel {
      background: var(--glass-bg);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid var(--glass-border);
      border-radius: 24px;
      padding: 20px;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5), 
                  inset 0 1px 0 var(--glass-shine);
    }

    .stats-summary {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 20px;
    }
    
    .summary-card { padding: 16px; }
    .summary-label {
      font-size: 10px;
      font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 6px;
    }
    .summary-val {
      font-size: 18px;
      font-weight: 600;
      letter-spacing: -0.02em;
    }

    .chart-container {
      display: flex;
      flex-direction: column;
      margin-bottom: 20px;
    }

    .chart-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
    }
    .chart-title {
      font-size: 10px;
      font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }
    .chart-nav-btn {
      background: none;
      border: none;
      color: var(--text-muted);
      cursor: pointer;
      padding: 4px 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      outline: none;
      transition: color 0.2s, opacity 0.2s;
    }
    .chart-nav-btn:active {
      opacity: 0.5;
    }
    .chart-nav-btn.disabled {
      opacity: 0.15;
      pointer-events: none;
    }

    .chart-bars {
      display: flex;
      justify-content: space-between;
      align-items: stretch; 
      height: 140px;
      padding-bottom: 4px;
    }
    .bar-wrapper {
      display: flex;
      flex-direction: column;
      align-items: center;
      flex: 1;
      height: 100%;             
      justify-content: flex-end; 
    }
    .bar {
      width: 14px;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 7px;
      height: 0%;
      transition: height 0.6s cubic-bezier(0.16, 1, 0.3, 1), opacity 0.6s cubic-bezier(0.16, 1, 0.3, 1);
      position: relative;
    }
    .bar.highlight {
      background: #ffffff;
      box-shadow: 0 0 12px rgba(255, 255, 255, 0.3);
    }
    .bar-day {
      font-size: 10px;
      color: var(--text-muted);
      margin-top: 8px;
      font-weight: 500;
    }

    .history-section-title {
      font-size: 10px;
      font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 12px;
    }

    /* АМБІЄНТНЕ ЗАТЕМНЕННЯ ІСТОРІЇ (linear-gradient mask) */
    .full-history-list {
      flex: 1;
      overflow-y: scroll;
      padding-right: 2px;
      -webkit-mask-image: linear-gradient(to bottom, black 60%, transparent 95%);
      mask-image: linear-gradient(to bottom, black 60%, transparent 95%);
      padding-bottom: 40px; /* Запас для скролу */
    }
    .full-history-list::-webkit-scrollbar { display: none; }

    .swipe-container {
      position: relative;
      overflow: hidden;
      margin-bottom: 12px;
      border-radius: 18px;
      height: 64px;
      background-color: transparent;
    }

    .history-row {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: var(--glass-bg);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid var(--glass-border);
      border-radius: 18px;
      padding: 12px 16px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      z-index: 2;
      box-shadow: inset 0 1px 0 var(--glass-shine);
      transform: translateX(0px);
    }

    .history-row.unsynced::after {
      content: '';
      position: absolute;
      top: 10px;
      right: 10px;
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #ffd60a;
    }

    .delete-underlay {
      position: absolute;
      top: 0;
      right: 0;
      width: 74px;
      height: 100%;
      background-color: #ff3b30;
      border-radius: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #ffffff;
      z-index: 1;
      cursor: pointer;
      transform: translateX(74px);
    }

    .delete-icon {
      width: 22px;
      height: 22px;
      fill: #ffffff;
    }

    .history-time {
      font-size: 16px;
      font-weight: 500;
      letter-spacing: -0.01em;
      display: flex;
      align-items: center;
    }
    .history-date {
      font-size: 13px;
      color: var(--text-muted);
    }

    /* --- ZEN RATING OVERLAY (No buttons, no texts, seamless black) --- */
    .rating-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: #000000;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 100;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.5s cubic-bezier(0.16, 1, 0.3, 1);
    }
    .rating-overlay.active {
      opacity: 1;
      pointer-events: auto;
    }
    .pillar-container {
      width: 100%;
      height: 100%;
      position: relative;
    }
    #pillar-canvas {
      width: 100%;
      height: 100%;
    }
  </style>
</head>
<body>

  <div class="app-container">
    
    <!-- HOME SCREEN -->
    <section id="screen-home" class="screen" onclick="handleScreenTap(event)">
      <button id="nav-to-stats-btn" class="nav-arrow-btn" onclick="navigateToStats(event)">
        <svg viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="1.2" fill="none" stroke-linecap="round" stroke-linejoin="round">
          <line x1="5" y1="12" x2="19" y2="12"></line>
          <polyline points="12 5 19 12 12 19"></polyline>
        </svg>
      </button>

      <div id="sync-indicator" class="sync-indicator offline" title="Sync status"></div>
      
      <div id="status-label" class="center-status">Tap to sleep</div>
      
      <div id="ecg-container" class="ecg-container">
        <canvas id="ecg-canvas"></canvas>
      </div>

      <div id="sleep-timer-minimal" class="sleep-timer-minimal">00:00:00</div>
    </section>

    <!-- STATS SCREEN (Pure black seamless layout) -->
    <section id="screen-stats" class="screen">
      <button class="back-arrow-btn" onclick="navigateToHome()">
        <svg viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="1.2" fill="none" stroke-linecap="round" stroke-linejoin="round">
          <line x1="19" y1="12" x2="5" y2="12"></line>
          <polyline points="12 19 5 12 12 5"></polyline>
        </svg>
      </button>

      <div class="stats-summary">
        <div class="glass-panel summary-card">
          <div class="summary-label">Avg. Sleep</div>
          <div id="stat-avg-duration" class="summary-val">—</div>
        </div>
        <div class="glass-panel summary-card">
          <div class="summary-label">Avg. Bedtime</div>
          <div id="stat-avg-bedtime" class="summary-val">—</div>
        </div>
      </div>

      <div class="glass-panel chart-container">
        <div class="chart-header">
          <button class="chart-nav-btn" onclick="navigateWeek(-1)">
            <svg viewBox="0 0 24 24" width="16" height="16" stroke="currentColor" stroke-width="1.8" fill="none" stroke-linecap="round" stroke-linejoin="round">
              <polyline points="15 18 9 12 15 6"></polyline>
            </svg>
          </button>
          <div id="chart-week-range" class="chart-title">This Week</div>
          <button class="chart-nav-btn" id="chart-nav-next" onclick="navigateWeek(1)">
            <svg viewBox="0 0 24 24" width="16" height="16" stroke="currentColor" stroke-width="1.8" fill="none" stroke-linecap="round" stroke-linejoin="round">
              <polyline points="9 18 15 12 9 6"></polyline>
            </svg>
          </button>
        </div>
        <div class="chart-bars" id="chart-bars-container"></div>
      </div>

      <div class="history-section-title">All History</div>
      <div id="full-history" class="full-history-list"></div>
    </section>

  </div>

  <!-- ZEN RATING OVERLAY (Concentric Ripples Canvas Only) -->
  <div id="rating-overlay" class="rating-overlay">
    <div class="pillar-container">
      <canvas id="pillar-canvas"></canvas>
    </div>
  </div>

  <script>
    // ─── CONFIG ───────────────────────────────────────────────────────────────
    const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbypN-aHpg-5oU2PvcYcHnHKJKtqmddTfx2Jn8LC1zLfONw726-yz269GBq5cX1OCOxAjw/exec";

    // ─── STATE ────────────────────────────────────────────────────────────────
    let sleepData        = JSON.parse(localStorage.getItem('sleep_records'))      || [];
    let pendingInserts   = JSON.parse(localStorage.getItem('pending_inserts'))    || [];
    let pendingDeletes   = JSON.parse(localStorage.getItem('pending_deletes'))    || [];
    let activeSleepStart = localStorage.getItem('active_sleep_start')             || null;
    let tempSleepRecord  = null; 
    let isSyncing        = false;
    let currentWeekOffset = 0; 

    // ─── DOM REFS ─────────────────────────────────────────────────────────────
    const ecgCanvas       = document.getElementById('ecg-canvas');
    const ecgCtx          = ecgCanvas.getContext('2d');
    const syncIndicator   = document.getElementById('sync-indicator');
    const pillarCanvas    = document.getElementById('pillar-canvas');
    const pillarCtx      = pillarCanvas.getContext('2d');

    let ecgAnimationId = null;
    let pillarAnimId   = null;
    let waveTimer      = 0;
    let timerInterval  = null;
    let touchStartX    = 0;
    let activeSwipeRow = null;

    // Fluid continuous rating states
    let ratingProgress = 0.5; // Стан пальця (0.0 to 1.0)
    let currentProgress = 0.5; // Анімований стан
    let isDraggingPillar = false;

    const ratingLabels = {
      1: "Restless",
      2: "Light",
      3: "Good",
      4: "Deep",
      5: "Restorative"
    };

    // ─── INIT ─────────────────────────────────────────────────────────────────
    window.addEventListener('load', async () => {
      checkActiveSleepState();
      updateSyncIndicator();
      initPillarEvents();
      await fullSync();
      window.addEventListener('resize', () => {
        resizeCanvas();
        resizePillarCanvas();
      });
    });

    window.addEventListener('online', () => {
      updateSyncIndicator();
      fullSync();
    });

    window.addEventListener('offline', () => {
      updateSyncIndicator();
    });

    // ─── SYNC INDICATOR ───────────────────────────────────────────────────────
    function updateSyncIndicator(state) {
      syncIndicator.className = 'sync-indicator';

      if (state) {
        syncIndicator.classList.add(state);
        return;
      }

      if (!navigator.onLine) {
        syncIndicator.classList.add('offline');
      } else if (pendingInserts.length > 0 || pendingDeletes.length > 0) {
        syncIndicator.classList.add('syncing');
      } else {
        syncIndicator.classList.add('synced');
      }
    }

    // ─── FULL SYNC FLOW ───────────────────────────────────────────────────────
    async function fullSync() {
      if (!navigator.onLine || isSyncing) return;
      isSyncing = true;
      updateSyncIndicator('syncing');

      try {
        await pushPendingChanges();
        await pullFromCloud();
        updateSyncIndicator('synced');
      } catch (err) {
        console.error('[Sync] Error:', err);
        updateSyncIndicator('error');
        setTimeout(updateSyncIndicator, 3000);
      } finally {
        isSyncing = false;
      }
    }

    async function pushPendingChanges() {
      if (pendingInserts.length === 0 && pendingDeletes.length === 0) return;

      const inserts = sleepData.filter(r => pendingInserts.includes(r.id));
      const deletes = [...pendingDeletes];

      await fetch(APPS_SCRIPT_URL, {
        method: 'POST',
        mode: 'no-cors',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ inserts, deletes })
      });

      pendingInserts = [];
      pendingDeletes = deletes.length > 0
        ? pendingDeletes.filter(id => !deletes.includes(id))
        : [];

      localStorage.setItem('pending_inserts', JSON.stringify(pendingInserts));
      localStorage.setItem('pending_deletes', JSON.stringify(pendingDeletes));
    }

    async function pullFromCloud() {
      const response = await fetch(APPS_SCRIPT_URL + '?t=' + Date.now());
      if (!response.ok) throw new Error('Cloud fetch failed: ' + response.status);

      const cloudData = await response.json();
      if (!Array.isArray(cloudData)) throw new Error('Unexpected cloud response format');

      const deletedSet = new Set(pendingDeletes);

      const cloudMap = new Map();
      cloudData.forEach(r => {
        if (!deletedSet.has(r.id)) {
          cloudMap.set(r.id, { ...r, synced: true });
        }
      });

      sleepData.forEach(r => {
        if (pendingInserts.includes(r.id) && !cloudMap.has(r.id)) {
          cloudMap.set(r.id, { ...r, synced: false });
        }
      });

      sleepData = Array.from(cloudMap.values())
        .sort((a, b) => new Date(b.startTime) - new Date(a.startTime));

      localStorage.setItem('sleep_records', JSON.stringify(sleepData));

      if (document.getElementById('screen-stats').classList.contains('active')) {
        renderStatistics();
      }
    }

    // ─── CANVAS ───────────────────────────────────────────────────────────────
    function resizeCanvas() {
      if (activeSleepStart) {
        ecgCanvas.width  = ecgCanvas.parentElement.clientWidth  * window.devicePixelRatio;
        ecgCanvas.height = ecgCanvas.parentElement.clientHeight * window.devicePixelRatio;
        ecgCtx.scale(window.devicePixelRatio, window.devicePixelRatio);
      }
    }

    // ─── SLEEP STATE ──────────────────────────────────────────────────────────
    function checkActiveSleepState() {
      const homeScreen   = document.getElementById('screen-home');
      const ecgContainer = document.getElementById('ecg-container');
      
      if (activeSleepStart) {
        document.body.classList.add('sleeping');
        homeScreen.classList.add('sleeping');
        ecgContainer.style.display = "block";
        resizeCanvas();
        startWaveAnimation();
        startTimer();
      } else {
        if (!document.getElementById('screen-stats').classList.contains('active')) {
          document.body.classList.remove('sleeping');
        }
        homeScreen.classList.remove('sleeping');
        ecgContainer.style.display = "none";
        stopWaveAnimation();
        stopTimer();
      }
    }

    function startWaveAnimation() {
      if (ecgAnimationId) cancelAnimationFrame(ecgAnimationId);
      waveTimer = Date.now();

      const width    = ecgCanvas.width  / window.devicePixelRatio;
      const height   = ecgCanvas.height / window.devicePixelRatio;
      const baseline = height / 2;

      function draw() {
        if (!activeSleepStart) return;

        ecgCtx.clearRect(0, 0, width, height);

        const now          = Date.now();
        const elapsed      = (now - waveTimer) / 1000;
        const cycleDuration = 5.0;
        const totalCycle   = cycleDuration * 2;
        const progress     = (elapsed % totalCycle) / cycleDuration;

        let startX, endX;
        if (progress <= 1) {
          startX = 0;
          endX   = width * progress;
        } else {
          startX = width * (progress - 1);
          endX   = width;
        }

        ecgCtx.strokeStyle = 'rgba(255, 255, 255, 0.4)';
        ecgCtx.lineWidth   = 1.2;
        ecgCtx.shadowBlur  = 4;
        ecgCtx.shadowColor = 'rgba(255, 255, 255, 0.2)';
        ecgCtx.lineJoin    = 'round';
        ecgCtx.beginPath();

        let started = false;
        for (let x = Math.round(startX); x <= Math.round(endX); x++) {
          const amplitude = 22 * Math.sin((x / width) * Math.PI);
          const y = baseline + Math.sin(x * 0.04 - elapsed * 1.5) * amplitude;
          if (!started) { ecgCtx.moveTo(x, y); started = true; }
          else            ecgCtx.lineTo(x, y);
        }
        ecgCtx.stroke();
        ecgAnimationId = requestAnimationFrame(draw);
      }

      draw();
    }

    function stopWaveAnimation() {
      if (ecgAnimationId) { cancelAnimationFrame(ecgAnimationId); ecgAnimationId = null; }
    }

    function startTimer() {
      if (timerInterval) clearInterval(timerInterval);
      const display = document.getElementById('sleep-timer-minimal');
      const update = () => {
        const diff = new Date() - new Date(activeSleepStart);
        const h = Math.floor(diff / 3600000);
        const m = Math.floor((diff % 3600000) / 60000);
        const s = Math.floor((diff % 60000) / 1000);
        display.textContent = `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
      };
      update();
      timerInterval = setInterval(update, 1000);
    }

    function stopTimer() {
      if (timerInterval) { clearInterval(timerInterval); timerInterval = null; }
    }

    // ─── TOGGLE SLEEP ─────────────────────────────────────────────────────────
    function handleScreenTap(event) {
      if (event.target.closest('#nav-to-stats-btn') || event.target.closest('#rating-overlay')) return;
      toggleSleep();
    }

    function toggleSleep() {
      if (!activeSleepStart) {
        activeSleepStart = new Date().toISOString();
        localStorage.setItem('active_sleep_start', activeSleepStart);
        checkActiveSleepState();
      } else {
        const endTime    = new Date().toISOString();
        const startTime  = activeSleepStart;
        
        const durationMs = new Date(endTime) - new Date(startTime);
        const durationHrs = durationMs / 3600000;

        activeSleepStart = null;
        localStorage.removeItem('active_sleep_start');
        checkActiveSleepState();

        if (durationMs >= 60000) {
          tempSleepRecord = {
            startTime,
            endTime,
            duration: parseFloat(durationHrs.toFixed(4))
          };
          showQualityRatingOverlay();
        } else {
          fullSync();
        }
      }
    }

    // ─── AMBIENT GRAVITY RIPPLES ENGINE (Concentric liquid rings) ─────────────
    function showQualityRatingOverlay() {
      document.getElementById('rating-overlay').classList.add('active');
      startPillarAnimation();
    }

    function resizePillarCanvas() {
      pillarCanvas.width  = pillarCanvas.parentElement.clientWidth  * window.devicePixelRatio;
      pillarCanvas.height = pillarCanvas.parentElement.clientHeight * window.devicePixelRatio;
      pillarCtx.scale(window.devicePixelRatio, window.devicePixelRatio);
    }

    function startPillarAnimation() {
      resizePillarCanvas();
      ratingProgress = 0.5; 
      currentProgress = 0.5;

      function loop() {
        if (!document.getElementById('rating-overlay').classList.contains('active')) return;
        drawPillarCurve();
        pillarAnimId = requestAnimationFrame(loop);
      }
      loop();
    }

    function drawPillarCurve() {
      const width = pillarCanvas.width / window.devicePixelRatio;
      const height = pillarCanvas.height / window.devicePixelRatio;
      
      pillarCtx.clearRect(0, 0, width, height);

      const centerX = width / 2;
      const centerY = height / 2;

      // Smooth interpolation for fluid movement
      currentProgress += (ratingProgress - currentProgress) * 0.12;

      const time = Date.now();

      // Draw 5 concentric fluid geometric ripples
      for (let i = 1; i <= 5; i++) {
        // Radius scales with continuous progress
        let radius = (i * 24) * currentProgress + 10;
        
        // Add delicate, hardware-like undulating vibration (sine offset)
        const waveOffset = Math.sin(time * 0.0035 + i * 0.8) * (2.2 * currentProgress);
        radius += waveOffset;

        // Opacity ranges from 0.05 to 0.8 based on input height
        const baseOpacity = 0.06 + currentProgress * 0.74;
        const ringOpacity = baseOpacity * (1 - (i - 1) * 0.15); // Fade outer rings
        
        // Glow amount scales with height
        const glowBlur = currentProgress * 15;

        pillarCtx.shadowBlur = glowBlur;
        pillarCtx.shadowColor = '#ffffff';
        pillarCtx.strokeStyle = `rgba(255, 255, 255, ${Math.max(0.01, ringOpacity)})`;
        pillarCtx.lineWidth = 0.6 + currentProgress * 0.4; // Extremely thin elegant lines

        pillarCtx.beginPath();
        pillarCtx.arc(centerX, centerY, radius, 0, Math.PI * 2);
        pillarCtx.stroke();
      }

      // Reset shadows for drawing text
      pillarCtx.shadowBlur = 0;

      // Draw a single elegant focus word in the exact center of the ripples
      const roundedRating = Math.max(1, Math.min(5, Math.round(currentProgress * 4) + 1));
      const labelText = ratingLabels[roundedRating];
      
      const textOpacity = 0.22 + currentProgress * 0.78;
      pillarCtx.fillStyle = `rgba(255, 255, 255, ${textOpacity})`;
      pillarCtx.font = '300 20px "Inter", -apple-system, sans-serif';
      pillarCtx.textAlign = 'center';
      pillarCtx.textBaseline = 'middle';
      pillarCtx.fillText(labelText, centerX, centerY);
    }

    function initPillarEvents() {
      const handleInput = (clientY) => {
        const rect = pillarCanvas.getBoundingClientRect();
        const y = clientY - rect.top;
        const height = rect.height;
        
        const lineTop = height * 0.22;
        const lineBottom = height * 0.78;
        const totalLength = lineBottom - lineTop;

        const clampedY = Math.max(lineTop, Math.min(lineBottom, y));
        // Precise continuous 0.0 to 1.0 progress calculation
        ratingProgress = (lineBottom - clampedY) / totalLength;
      };

      pillarCanvas.addEventListener('touchstart', e => {
        isDraggingPillar = true;
        handleInput(e.touches[0].clientY);
      }, { passive: true });

      pillarCanvas.addEventListener('touchmove', e => {
        if (isDraggingPillar) {
          handleInput(e.touches[0].clientY);
        }
      }, { passive: true });

      // Save instantly on finger release
      pillarCanvas.addEventListener('touchend', e => {
        if (isDraggingPillar) {
          isDraggingPillar = false;
          const finalRating = Math.max(1, Math.min(5, Math.round(ratingProgress * 4) + 1));
          saveSessionWithRating(finalRating);
        }
      });

      pillarCanvas.addEventListener('mousedown', e => {
        isDraggingPillar = true;
        handleInput(e.clientY);
        const onMouseMove = (ev) => {
          if (isDraggingPillar) handleInput(ev.clientX || ev.clientY ? ev.clientY : ev.touches[0].clientY);
        };
        const onMouseUp = () => {
          if (isDraggingPillar) {
            isDraggingPillar = false;
            const finalRating = Math.max(1, Math.min(5, Math.round(ratingProgress * 4) + 1));
            saveSessionWithRating(finalRating);
          }
          window.removeEventListener('mousemove', onMouseMove);
          window.removeEventListener('mouseup', onMouseUp);
        };
        window.addEventListener('mousemove', onMouseMove);
        window.addEventListener('mouseup', onMouseUp);
      });
    }

    function saveSessionWithRating(rating) {
      if (pillarAnimId) cancelAnimationFrame(pillarAnimId);
      document.getElementById('rating-overlay').classList.remove('active');

      if (tempSleepRecord) {
        const id = Date.now().toString();
        const newRecord = {
          id,
          startTime: tempSleepRecord.startTime,
          endTime: tempSleepRecord.endTime,
          duration: tempSleepRecord.duration,
          rating: rating,
          synced: false
        };

        sleepData.unshift(newRecord);
        localStorage.setItem('sleep_records', JSON.stringify(sleepData));

        if (!pendingInserts.includes(id)) pendingInserts.push(id);
        localStorage.setItem('pending_inserts', JSON.stringify(pendingInserts));
        updateSyncIndicator();
      }

      tempSleepRecord = null;
      fullSync();
    }

    // ─── NAVIGATION ───────────────────────────────────────────────────────────
    function navigateToStats(event) {
      event.stopPropagation();
      document.body.classList.add('sleeping');
      document.getElementById('screen-home').classList.add('left');
      document.getElementById('screen-stats').classList.add('active');
      currentWeekOffset = 0; 
      renderStatistics();
    }

    function navigateToHome() {
      if (!activeSleepStart) document.body.classList.remove('sleeping');
      document.getElementById('screen-home').classList.remove('left');
      document.getElementById('screen-stats').classList.remove('active');
    }

    function navigateWeek(direction) {
      currentWeekOffset += direction;
      if (currentWeekOffset > 0) currentWeekOffset = 0; 
      renderWeeklyChart();
    }

    // ─── DELETE ───────────────────────────────────────────────────────────────
    function deleteRecord(id) {
      sleepData = sleepData.filter(r => r.id !== id);
      localStorage.setItem('sleep_records', JSON.stringify(sleepData));

      if (pendingInserts.includes(id)) {
        pendingInserts = pendingInserts.filter(i => i !== id);
        localStorage.setItem('pending_inserts', JSON.stringify(pendingInserts));
      } else {
        if (!pendingDeletes.includes(id)) pendingDeletes.push(id);
        localStorage.setItem('pending_deletes', JSON.stringify(pendingDeletes));
      }

      updateSyncIndicator();
      renderStatistics();
      fullSync();
    }

    // ─── RENDER STATISTICS ────────────────────────────────────────────────────
    function renderStatistics() {
      if (sleepData.length === 0) {
        document.getElementById('stat-avg-duration').textContent = '—';
        document.getElementById('stat-avg-bedtime').textContent  = '—';
        renderWeeklyChart();
        document.getElementById('full-history').innerHTML =
          '<div style="color:var(--text-muted); padding: 10px 0; font-size:14px;">No history yet</div>';
        return;
      }

      // Avg Duration
      const avgDuration = sleepData.reduce((a, c) => a + c.duration, 0) / sleepData.length;
      const avgH = Math.floor(avgDuration);
      const avgM = Math.round((avgDuration % 1) * 60);
      document.getElementById('stat-avg-duration').textContent =
        avgH > 0 ? `${avgH}h ${avgM}m` : `${avgM}m`;

      // Avg Bedtime
      const totalMin = sleepData.reduce((acc, item) => {
        const s = new Date(item.startTime);
        const h = s.getHours(), m = s.getMinutes();
        return acc + (h >= 12 ? (h - 12) * 60 + m : (h + 12) * 60 + m);
      }, 0);
      let avgBedH = Math.floor(totalMin / sleepData.length / 60) + 12;
      if (avgBedH >= 24) avgBedH -= 24;
      const avgBedM = Math.round((totalMin / sleepData.length) % 60);
      document.getElementById('stat-avg-bedtime').textContent =
        `${String(avgBedH).padStart(2,'0')}:${String(avgBedM).padStart(2,'0')}`;

      renderWeeklyChart();

      const container = document.getElementById('full-history');
      container.innerHTML = '';

      sleepData.forEach(item => {
        const start     = new Date(item.startTime);
        const end       = new Date(item.endTime);
        const dateStr   = end.toLocaleDateString('en-US', { weekday: 'short', day: 'numeric', month: 'short' });
        const fmt       = d => `${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
        const h         = Math.floor(item.duration);
        const m         = Math.round((item.duration % 1) * 60);
        const durStr    = h > 0 ? `${h}h ${m}m` : `${m}m`;
        const isUnsynced = !item.synced || pendingInserts.includes(item.id);
        const unsyncedClass = isUnsynced ? ' unsynced' : '';

        container.innerHTML += `
          <div class="swipe-container">
            <div class="delete-underlay" style="transform: translateX(74px);" onclick="deleteRecord('${item.id}')">
              <svg class="delete-icon" viewBox="0 0 24 24">
                <path d="M6 19c0 1.1.9 2 2 2h8c1.1 0 2-.9 2-2V7H6v12zM19 4h-3.5l-1-1h-5l-1 1H5v2h14V4z"/>
              </svg>
            </div>
            <div class="history-row${unsyncedClass}" style="transform: translateX(0px);">
              <div>
                <div class="history-time">${durStr}</div>
                <div style="font-size: 11px; color: var(--text-muted); margin-top: 4px; font-weight:500;">
                  ${fmt(start)} – ${fmt(end)}
                </div>
              </div>
              <span class="history-date">${dateStr}</span>
            </div>
          </div>
        `;
      });

      initSwipeGestures();
    }

    function getWeekRange(offset) {
      const today = new Date();
      const dayOfWeek = today.getDay();
      const monOffset = (dayOfWeek === 0 ? -6 : 1 - dayOfWeek) + (offset * 7);
      
      const monday = new Date(today);
      monday.setDate(today.getDate() + monOffset);
      monday.setHours(0,0,0,0);

      const sunday = new Date(monday);
      sunday.setDate(monday.getDate() + 6);
      sunday.setHours(23,59,59,999);

      return { monday, sunday };
    }

    function renderWeeklyChart() {
      const container  = document.getElementById('chart-bars-container');
      container.innerHTML = '';

      const { monday, sunday } = getWeekRange(currentWeekOffset);
      const daysLabels = ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];

      const week = Array.from({ length: 7 }, (_, i) => {
        const d = new Date(monday);
        d.setDate(monday.getDate() + i);
        return {
          dateString: d.toDateString(),
          label: daysLabels[i],
          duration: 0,
          ratingSum: 0,
          ratingCount: 0,
          isToday: d.toDateString() === new Date().toDateString()
        };
      });

      sleepData.forEach(item => {
        const key = new Date(item.endTime).toDateString();
        const day = week.find(d => d.dateString === key);
        if (day) {
          day.duration += item.duration;
          if (item.rating !== undefined && item.rating !== null) {
            day.ratingSum += item.rating;
            day.ratingCount++;
          }
        }
      });

      const fmtOpt = { day: 'numeric', month: 'short' };
      const rangeText = currentWeekOffset === 0 
        ? "This Week" 
        : `${monday.toLocaleDateString('en-US', fmtOpt)} – ${sunday.toLocaleDateString('en-US', fmtOpt)}`;
      document.getElementById('chart-week-range').textContent = rangeText;

      const nextBtn = document.getElementById('chart-nav-next');
      if (currentWeekOffset >= 0) nextBtn.classList.add('disabled');
      else                        nextBtn.classList.remove('disabled');

      const maxH = 12;
      week.forEach(day => {
        const pct = Math.min((day.duration / maxH) * 100, 100);
        
        // OPACITY BRIGHTNESS SCALES BASED ON RATING
        const avgRating = day.ratingCount > 0 ? (day.ratingSum / day.ratingCount) : null;
        let opacity = 0.65; 
        if (day.duration > 0 && avgRating !== null) {
          opacity = 0.22 + ((avgRating - 1) / 4) * 0.78;
        }

        const isTodayGlow = (day.isToday || (avgRating && avgRating >= 4.2));
        const barClass = isTodayGlow ? 'bar highlight' : 'bar';

        container.innerHTML += `
          <div class="bar-wrapper">
            <div class="${barClass}" style="height: ${pct}%; opacity: ${day.duration > 0 ? opacity : 0.1};" title="${day.duration.toFixed(1)} hrs"></div>
            <div class="bar-day">${day.label}</div>
          </div>
        `;
      });
    }

    // ─── SWIPE TO DELETE ──────────────────────────────────────────────────────
    function initSwipeGestures() {
      document.querySelectorAll('.history-row').forEach(row => {
        const underlay = row.parentElement.querySelector('.delete-underlay');

        row.addEventListener('touchstart', e => {
          touchStartX = e.touches[0].clientX;
          if (activeSwipeRow && activeSwipeRow !== row) {
            const prevUnderlay = activeSwipeRow.parentElement.querySelector('.delete-underlay');
            activeSwipeRow.style.transition = 'transform 0.25s cubic-bezier(0.16, 1, 0.3, 1)';
            activeSwipeRow.style.transform  = 'translateX(0px)';
            if (prevUnderlay) {
              prevUnderlay.style.transition = 'transform 0.25s cubic-bezier(0.16, 1, 0.3, 1)';
              prevUnderlay.style.transform  = 'translateX(74px)';
            }
          }
        }, { passive: true });

        row.addEventListener('touchmove', e => {
          const diff = e.touches[0].clientX - touchStartX;
          if (diff < 0) {
            row.style.transition     = 'none';
            if (underlay) underlay.style.transition = 'none';
            const t = Math.max(diff, -85);
            row.style.transform      = `translateX(${t}px)`;
            if (underlay) underlay.style.transform = `translateX(${Math.max(74 + t, 0)}px)`;
          } else {
            row.style.transform = 'translateX(0px)';
            if (underlay) underlay.style.transform = 'translateX(74px)';
          }
        }, { passive: true });

        row.addEventListener('touchend', e => {
          const diff = e.changedTouches[0].clientX - touchStartX;
          row.style.transition     = 'transform 0.25s cubic-bezier(0.16, 1, 0.3, 1)';
          if (underlay) underlay.style.transition = 'transform 0.25s cubic-bezier(0.16, 1, 0.3, 1)';
          if (diff < -40) {
            row.style.transform      = 'translateX(-74px)';
            if (underlay) underlay.style.transform = 'translateX(0px)';
            activeSwipeRow = row;
          } else {
            row.style.transform      = 'translateX(0px)';
            if (underlay) underlay.style.transform = 'translateX(74px)';
            activeSwipeRow = null;
          }
        });
      });
    }
  </script>
